descriptor_version: "1.0"
part: "LTC2991"
manufacturer: "Analog Devices"
summary: "8-channel I2C voltage/temperature monitor."
transport:
  type: i2c
  address_width: 8           # 8-bit register address
  default_address: 0x48      # 0x48..0x4F via address pins
  byte_order: big
access_primitives:
  read_register:  { pattern: write_addr_then_read, width_bytes: 1 }
  write_register: { pattern: write_addr_then_data, width_bytes: 1 }
registers:
  - { name: STATUS_LOW,  offset: 0x00, width: 8, access: ro, reset: 0x00,
      fields: [
        { name: V1_READY, bits: "0" },
        { name: V2_READY, bits: "1" },
        { name: V3_READY, bits: "2" },
        { name: V4_READY, bits: "3" },
        { name: V5_READY, bits: "4" },
        { name: V6_READY, bits: "5" },
        { name: V7_READY, bits: "6" },
        { name: V8_READY, bits: "7" } ] }
  - { name: STATUS_HIGH, offset: 0x01, width: 8, access: rw, reset: 0x00,
      fields: [
        { name: VCC_READY, bits: "0" },
        { name: T_INTERNAL_READY, bits: "1" },
        { name: BUSY, bits: "2" },
        { name: T_INTERNAL_VCC_ENABLE, bits: "3" },
        { name: V1_V2_ENABLE, bits: "4" },
        { name: V3_V4_ENABLE, bits: "5" },
        { name: V5_V6_ENABLE, bits: "6" },
        { name: V7_V8_ENABLE, bits: "7" } ] }
  - { name: CONTROL_V1V4, offset: 0x06, width: 8, access: rw, reset: 0x00,
      fields: [
        { name: V1_V2_DIFFERENTIAL, bits: "0" },
        { name: V1_V2_TEMPERATURE, bits: "1" },
        { name: V3_V4_DIFFERENTIAL, bits: "4" },
        { name: V3_V4_TEMPERATURE, bits: "5" } ] }
  - { name: CONTROL_V5V8, offset: 0x07, width: 8, access: rw, reset: 0x00,
      fields: [
        { name: V5_V6_DIFFERENTIAL, bits: "0" },
        { name: V5_V6_TEMPERATURE, bits: "1" },
        { name: V7_V8_DIFFERENTIAL, bits: "4" },
        { name: V7_V8_TEMPERATURE, bits: "5" } ] }
  - { name: V1_MSB, offset: 0x0A, width: 8, access: ro, reset: 0x00 }
  - { name: V1_LSB, offset: 0x0B, width: 8, access: ro, reset: 0x00 }
  - { name: V2_MSB, offset: 0x0C, width: 8, access: ro, reset: 0x00 }
  - { name: V2_LSB, offset: 0x0D, width: 8, access: ro, reset: 0x00 }
  - { name: V3_MSB, offset: 0x0E, width: 8, access: ro, reset: 0x00 }
  - { name: V3_LSB, offset: 0x0F, width: 8, access: ro, reset: 0x00 }
  - { name: V4_MSB, offset: 0x10, width: 8, access: ro, reset: 0x00 }
  - { name: V4_LSB, offset: 0x11, width: 8, access: ro, reset: 0x00 }
  - { name: V5_MSB, offset: 0x12, width: 8, access: ro, reset: 0x00 }
  - { name: V5_LSB, offset: 0x13, width: 8, access: ro, reset: 0x00 }
  - { name: V6_MSB, offset: 0x14, width: 8, access: ro, reset: 0x00 }
  - { name: V6_LSB, offset: 0x15, width: 8, access: ro, reset: 0x00 }
  - { name: V7_MSB, offset: 0x16, width: 8, access: ro, reset: 0x00 }
  - { name: V7_LSB, offset: 0x17, width: 8, access: ro, reset: 0x00 }
  - { name: V8_MSB, offset: 0x18, width: 8, access: ro, reset: 0x00 }
  - { name: V8_LSB, offset: 0x19, width: 8, access: ro, reset: 0x00 }
  - { name: T_INTERNAL_MSB, offset: 0x1A, width: 8, access: ro, reset: 0x00 }
  - { name: T_INTERNAL_LSB, offset: 0x1B, width: 8, access: ro, reset: 0x00 }
  - { name: VCC_MSB, offset: 0x1C, width: 8, access: ro, reset: 0x00 }
  - { name: VCC_LSB, offset: 0x1D, width: 8, access: ro, reset: 0x00 }
operations:
  - name: device_init
    description: "Initialize from device.config using the LTC2991 profile-generated register write sequence."
    steps:
      - { op: comment, note: "LTC2991 profile emits STATUS_HIGH, CONTROL_V1V4, and CONTROL_V5V8 writes." }
  - name: voltage_read
    returns: "voltages[8]"
    description: "Read all eight voltage channels as raw 14-bit codes."
    steps:
      - { op: poll, reg: STATUS_HIGH, field: BUSY, until: 0, timeout_ms: 10 }
      - { op: read_channels, reg: V1_MSB, count: 8 }
  - name: temperature_read
    returns: "uint16"
    description: "Read the internal temperature as a raw code."
    steps:
      - { op: poll, reg: STATUS_HIGH, field: BUSY, until: 0, timeout_ms: 10 }
      - { op: read_register, reg: T_INTERNAL_MSB }
      - { op: read_register, reg: T_INTERNAL_LSB }
  - name: vcc_read
    returns: "uint16"
    description: "Read VCC as a raw code."
    steps:
      - { op: poll, reg: STATUS_HIGH, field: BUSY, until: 0, timeout_ms: 10 }
      - { op: read_register, reg: VCC_MSB }
      - { op: read_register, reg: VCC_LSB }
test_hints:
  self_test:     { description: "Read STATUS_LOW, verify reset value 0x00." }
  read_loopback: { description: "Read all voltages, verify codes are within plausible range." }
