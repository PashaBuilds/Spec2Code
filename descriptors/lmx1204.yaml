descriptor_version: "1.0"
part: "LMX1204"
manufacturer: "Texas Instruments"
summary: "Low-noise high-frequency JESD buffer, multiplier, divider, and SYSREF distribution device."
transport:
  type: spi
  byte_order: big
  register_model:
    ticspro_words: true
    frame_bits: 24
    address_bits: 7
    address_shift: 16
    data_bits: 16
    rw_bit: 23
    write_value: 0
    default_order: descending
    spi_mode: 0
    max_sck_hz: 2000000
    # Readback SNAS800B 5.7 / Fig. 5-1 ile dogrulandi: R/W=1 + 7-bit adres +
    # 16-bit veri; veri MUXOUT (pin 1) uzerinde SCK dusen kenarda cikar,
    # adanmis SDO pini yok. MUXOUT_SEL (R23/0x17 bit 6) reset 0 = Lock
    # Detect oldugundan readback icin once 1 (SDO) yazilmali. Not (5.7):
    # okunan deger her zaman yazilan degil, dahili cihaz durumu olabilir;
    # MUXOUT readback sonrasi otomatik tri-state olmaz (R86=0x0004 ile
    # MUXOUT_EN tri-state'e izin verir).
    readback:
      verified: true
      requires: "MUXOUT_SEL=1 (R23/0x17 bit 6, reset 0=Lock Detect) yazilmis ve MUXOUT (pin 1) MISO'ya bagli olmali"
access_primitives:
  write_register_word: { pattern: ticspro_24bit_word }
registers:
  - { name: R0, offset: 0x00, width: 16, access: rw, reset: 0x0000,
      fields: [
        { name: RESET, bits: "0" },
        { name: POWERDOWN, bits: "2" } ] }
  - { name: R2, offset: 0x02, width: 16, access: rw, reset: 0x0223 }
  - { name: R6, offset: 0x06, width: 16, access: rw }
  # MUXOUT kontrolu (SNAS800B 7.1.22, Table 7-24; reset 0x4000).
  - { name: R23, offset: 0x17, width: 16, access: rw, reset: 0x4000,
      fields: [
        { name: MUXOUT_EN, bits: "13", description: "0=Tri-State (R86=0x0000 iken push-pull'a zorlanir), 1=Push-Pull" },
        { name: MUXOUT_SEL, bits: "6", description: "0=Lock Detect, 1=SDO (SPI readback)" } ] }
  - { name: R14, offset: 0x0E, width: 16, access: rw }
  - { name: R15, offset: 0x0F, width: 16, access: rw }
operations:
  - name: device_init
    description: "Apply the ordered TICS Pro 24-bit register array over SPI."
    steps:
      - { op: comment, note: "config.ticspro_registers is emitted verbatim as MSB-first SPI writes." }
test_hints:
  self_test: { description: "Initialize SPI and emit the configured TICS Pro register array." }
