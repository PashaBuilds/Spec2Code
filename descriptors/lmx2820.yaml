descriptor_version: "1.0"
part: "LMX2820"
manufacturer: "Texas Instruments"
summary: "22.6 GHz wideband PLLatinum RF synthesizer with phase synchronization and JESD204B support."
transport:
  type: spi
  byte_order: big
  register_model:
    ticspro_words: true
    # Frame format (R/W msb + 7-bit addr + 16-bit data) is not printed in the
    # public SNAS783C datasheet; it matches the documented LMX1204 family
    # format (SNAS800B fig. 5-1) and TI E2E confirmations. fSCK max 40 MHz and
    # descending order + R0 rewrite after 10 ms are from SNAS783C 6.6/8.3.
    frame_bits: 24
    address_bits: 7
    address_shift: 16
    data_bits: 16
    rw_bit: 23
    write_value: 0
    default_order: descending
    spi_mode: 0
    max_sck_hz: 40000000
    rewrite_last_address: 0x00
    rewrite_last_address_after_ms: 10
    # Readback resmi olarak var (SNAS783C 7.3.6 "MUXOUT Pin and Readback";
    # 6.6 SERIAL INTERFACE READ TIMING, tOD = SCK->MUXout). MUXOUT (pin 23)
    # ADANMIS SPI readback cikisidir - bu parcada MUXOUT_LD_SEL alani yok,
    # lock detect ayri LD pininde (pin 38, LD_TYPE R17[6]) oldugundan
    # register konfigurasyonu gerekmez. Okuma frame'i (R/W=1) yazmayla ayni
    # LMX1204-ailesi formati (SNAS800B fig. 5-1; SNAS783C bit diyagrami
    # basmamistir, TI E2E staff teyidi).
    readback:
      verified: true
      requires: "MUXOUT (pin 23) MISO'ya bagli olmali - adanmis SPI readback cikisi, register konfigurasyonu gerekmez (lock detect ayri LD pininde)"
access_primitives:
  write_register_word: { pattern: ticspro_24bit_word }
registers:
  # Reset per SNAU251A section 1.1 (R0 reset = 0x4070).
  - { name: R0, offset: 0x00, width: 16, access: rw, reset: 0x4070,
      fields: [
        { name: POWERDOWN, bits: "0" },
        { name: RESET, bits: "1" },
        { name: FCAL_EN, bits: "4" },
        { name: DBLR_CAL_EN, bits: "6" } ] }
  - { name: R1, offset: 0x01, width: 16, access: rw }
  - { name: R35, offset: 0x23, width: 16, access: rw }
  - { name: R36, offset: 0x24, width: 16, access: rw }
  # Readback durum registerlari (SNAU251A Tables 1-77..1-79).
  - { name: R74, offset: 0x4A, width: 16, access: ro,
      fields: [
        { name: rb_LD, bits: "15:14", description: "VCO kalibrasyon/lock durumu" },
        { name: rb_VCO_CAPCTRL, bits: "12:5" },
        { name: rb_VCO_SEL, bits: "4:2" } ] }
  - { name: R75, offset: 0x4B, width: 16, access: rw }
  - { name: R76, offset: 0x4C, width: 16, access: ro,
      fields: [
        { name: rb_TEMP_SENS, bits: "10:0", description: "dahili sicaklik sensoru okumasi" } ] }
  # --- Katalogdan birlestirilen register haritasi (Registers ekrani
  # katalogla birebir olsun; kaynak: knowledge.ts, datasheet-dogrulanmis). ---
  - name: R2
    offset: 2
    width: 16
    access: rw
    reset: 0xb3e8
    description: "LMX2820 SNAU251A register map girdisi R2; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: CAL_CLK_DIV
        bits: "14:12"
        description: "R/W alan; reset 0x3. TI açıklaması: Divides down the state machine clock (fsm) during VCO calibration. Maximum fsm is 200 MHz. fsm = fOSCIN / (2CAL_CLK_DIV). All other values are reserved 0x0: fOSCIN ≤ 200 MHz; 0x1: fOSCIN ≤ 400 MHz; 0x2: fOSCIN ≤ 800 MHz; 0x3: All other fOSCIN values"
      - name: INSTCAL_DLY
        bits: "11:1"
        description: "R/W alan; reset 0x1F4. TI açıklaması: Sets the wait time for instant calibration. INSTCAL_DLY = T x fOSCIN / (2CAL_CLK_DIV). T = 2.5 x CBIASVCO / 4.7 µF. CBIASVCO is the bypass capacitor at pin 3."
      - name: QUICK_RECAL_EN
        bits: "0"
        description: "R/W alan; reset 0x0. TI açıklaması: Starts VCO calibration with the current VCO_SEL, VCO_CAPCTRL and VCO_DACISET values. 0x0: Disabled; 0x1: Enabled"
  - name: R3
    offset: 3
    width: 16
    access: rw
    reset: 0x41
    description: "LMX2820 SNAU251A register map girdisi R3; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R4
    offset: 4
    width: 16
    access: rw
    reset: 0x4204
    description: "LMX2820 SNAU251A register map girdisi R4; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R5
    offset: 5
    width: 16
    access: rw
    reset: 0x3832
    description: "LMX2820 SNAU251A register map girdisi R5; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R6
    offset: 6
    width: 16
    access: rw
    reset: 0xa43
    description: "LMX2820 SNAU251A register map girdisi R6; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: ACAL_CMP_DLY
        bits: "15:8"
        description: "R/W alan; reset 0xA. TI açıklaması: VCO amplitude calibration delay. Lowering this value can speed up calibration time. If too low, phase noise may not be optimal due to insufficient time to reach final calibrated amplitude. Delay time = ACAL_CMP_DLY x 2 x state machine clock cycle."
  - name: R7
    offset: 7
    width: 16
    access: rw
    reset: 0xc8
    description: "LMX2820 SNAU251A register map girdisi R7; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R8
    offset: 8
    width: 16
    access: rw
    reset: 0xc802
    description: "LMX2820 SNAU251A register map girdisi R8; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R9
    offset: 9
    width: 16
    access: rw
    reset: 5
    description: "LMX2820 SNAU251A register map girdisi R9; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R10
    offset: 0xa
    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R10; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PFD_DLY_MANUAL
        bits: "12"
        description: "R/W alan; reset 0x0. TI açıklaması: Enables manual PFD_DLY adjustment. 0x0: Disabled; 0x1: Enabled"
      - name: VCO_DACISET_FORCE
        bits: "11"
        description: "R/W alan; reset 0x0. TI açıklaması: Forces the VCO to use the current setting specified by VCO_DACISET. Useful for full-assisted VCO calibration and debugging purposes. 0x0: Disabled; 0x1: Enabled"
      - name: VCO_CAPCTRL_FORCE
        bits: "7"
        description: "R/W alan; reset 0x0. TI açıklaması: Forces the VCO to use the sub-band specified by VCO_CAPCTRL. Useful for full-assisted VCO calibration and debugging purposes. 0x0: Disabled; 0x1: Enabled"
  - name: R11
    offset: 0xb
    width: 16
    access: rw
    reset: 0x603
    description: "LMX2820 SNAU251A register map girdisi R11; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: OSC_2X
        bits: "4"
        description: "R/W alan; reset 0x0. TI açıklaması: Enables reference input doubler. 0x0: Disabled; 0x1: Enabled"
  - name: R12
    offset: 0xc
    width: 16
    access: rw
    reset: 0x408
    description: "LMX2820 SNAU251A register map girdisi R12; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: MULT
        bits: "12:10"
        description: "R/W alan; reset 0x1. TI açıklaması: Sets reference path frequency multiplier value. All other values are reserved 0x1: Bypassed; 0x3: x3; 0x4: x4; 0x5: x5; 0x6: x6; 0x7: x7"
  - name: R13
    offset: 0xd
    width: 16
    access: rw
    reset: 0x38
    description: "LMX2820 SNAU251A register map girdisi R13; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PLL_R
        bits: "12:5"
        description: "R/W alan; reset 0x1. TI açıklaması: Sets reference path Post-R divider value."
  - name: R14
    offset: 0xe
    width: 16
    access: rw
    reset: 0x3001
    description: "LMX2820 SNAU251A register map girdisi R14; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PLL_R_PRE
        bits: "11:0"
        description: "R/W alan; reset 0x1. TI açıklaması: Sets reference path Pre-R divider value."
  - name: R15
    offset: 0xf
    width: 16
    access: rw
    reset: 0x2001
    description: "LMX2820 SNAU251A register map girdisi R15; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PFD_POL
        bits: "11"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets the polarity of phase detector. Internal VCO operation requires negative Vtune with non-inverting loop filter. 0x0: Negative Vtune; 0x1: Positive Vtune"
      - name: PFD_SINGLE
        bits: "10:9"
        description: "R/W alan; reset 0x0. TI açıklaması: Uses single PFD when PFDIN input is enabled. The actual charge pump current is equal to half the current setting made in CPG. Bit Field Type Reset Description 0x0: Normal operation; 0x1: Not used; 0x2: Not used; 0x3: Single PFD"
  - name: R16
    offset: 0x10
    width: 16
    access: rw
    reset: 0x271c
    description: "LMX2820 SNAU251A register map girdisi R16; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: CPG
        bits: "4:1"
        description: "R/W alan; reset 0xE. TI açıklaması: Sets charge pump gain value. All other values are reserved 0x0: Tri-state; 0x1: 1.4 mA; 0x4: 5.6 mA; 0x5: 7 mA; 0x6: 11.2 mA; 0x7: 12.6 mA; 0x8: 2.8 mA; 0x9: 4.2 mA; 0x12: 8.4 mA; 0x13: 9.8 mA; 0x14: 14 mA; 0x15: 15.4 mA"
  - name: R17
    offset: 0x11
    width: 16
    access: rw
    reset: 0x1440
    description: "LMX2820 SNAU251A register map girdisi R17; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: LD_TYPE
        bits: "6"
        description: "R/W alan; reset 0x1. TI açıklaması: Defines lock detect monitor type. One-Shot detects lock only after the VCO calibrates and the LD_DLY timeout counter is finished. Continuous lock detect checks for lock all the time, including when the input reference is removed. 0x0: One-Shot; 0x1: Continuous"
  - name: R18
    offset: 0x12
    width: 16
    access: rw
    reset: 0x3e8
    description: "LMX2820 SNAU251A register map girdisi R18; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: LD_DLY
        bits: "15:0"
        description: "R/W alan; reset 0x3E8. TI açıklaması: Lock detect assertion delay. This is the delay that is added after the VCO calibration is completed before indicating lock. This delay is only applied if LD_VTUNE_EN = 1. Delay time = LD_DLY / fPD."
  - name: R19
    offset: 0x13
    width: 16
    access: rw
    reset: 0x2120
    description: "LMX2820 SNAU251A register map girdisi R19; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: TEMPSENSE_EN
        bits: "4:3"
        description: "R/W alan; reset 0x0. TI açıklaması: Enables temperature sensor. 0x0: Disabled; 0x1: Reserved; 0x2: Reserved; 0x3: Enabled"
  - name: R20
    offset: 0x14
    width: 16
    access: rw
    reset: 0x272c
    description: "LMX2820 SNAU251A register map girdisi R20; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: VCO_DACISET
        bits: "8:0"
        description: "R/W alan; reset 0x12C. TI açıklaması: User specified start VCO current setting for calibration. Unless QUICK_RECAL_EN = 1, VCO calibration will always start with the VCO current setting that is specified in this field."
  - name: R21
    offset: 0x15
    width: 16
    access: rw
    reset: 0x1c64
    description: "LMX2820 SNAU251A register map girdisi R21; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R22
    offset: 0x16
    width: 16
    access: rw
    reset: 0xe2bf
    description: "LMX2820 SNAU251A register map girdisi R22; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: VCO_SEL
        bits: "15:13"
        description: "R/W alan; reset 0x7. TI açıklaması: User specified start VCO core for calibration. Unless QUICK_RECAL_EN = 1, VCO calibration will always start with the VCO core that is specified in this field. ... 0x0: Reserved; 0x1: VCO1; 0x2: VCO2; 0x6: VCO6; 0x7: VCO7"
      - name: VCO_CAPCTRL
        bits: "7:0"
        description: "R/W alan; reset 0xBF. TI açıklaması: User specified start VCO sub-band for calibration. Valid values are 191 to 0, where the higher number represents a lower frequency band. Unless QUICK_RECAL_EN = 1, VCO calibration will always start with the VCO sub-band that is specified in this field."
  - name: R23
    offset: 0x17
    width: 16
    access: rw
    reset: 0x1102
    description: "LMX2820 SNAU251A register map girdisi R23; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: VCO_SEL_FORCE
        bits: "0"
        description: "R/W alan; reset 0x0. TI açıklaması: Forces the VCO to use the core specified by VCO_SEL. Useful for full-assisted VCO calibration and debugging purposes. 0x0: Disabled; 0x1: Enabled"
  - name: R24
    offset: 0x18
    width: 16
    access: rw
    reset: 0xe34
    description: "LMX2820 SNAU251A register map girdisi R24; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R25
    offset: 0x19
    width: 16
    access: rw
    reset: 0x624
    description: "LMX2820 SNAU251A register map girdisi R25; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R26
    offset: 0x1a
    width: 16
    access: rw
    reset: 0xdb0
    description: "LMX2820 SNAU251A register map girdisi R26; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R27
    offset: 0x1b
    width: 16
    access: rw
    reset: 0x8001
    description: "LMX2820 SNAU251A register map girdisi R27; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R28
    offset: 0x1c
    width: 16
    access: rw
    reset: 0x639
    description: "LMX2820 SNAU251A register map girdisi R28; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R29
    offset: 0x1d
    width: 16
    access: rw
    reset: 0x318c
    description: "LMX2820 SNAU251A register map girdisi R29; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R30
    offset: 0x1e
    width: 16
    access: rw
    reset: 0xb18c
    description: "LMX2820 SNAU251A register map girdisi R30; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R31
    offset: 0x1f
    width: 16
    access: rw
    reset: 0x401
    description: "LMX2820 SNAU251A register map girdisi R31; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R32
    offset: 0x20
    width: 16
    access: rw
    reset: 0x1001
    description: "LMX2820 SNAU251A register map girdisi R32; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: CHDIVB
        bits: "11:9"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets divider value for RFOUTB. 0x0: Divide by 2; 0x1: Divide by 4; 0x2: Divide by 8; 0x3: Divide by 16; 0x4: Divide by 32; 0x5: Divide by 64; 0x6: Divide by 128; 0x7: Reserved"
      - name: CHDIVA
        bits: "8:6"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets divider value for RFOUTA. 0x0: Divide by 2; 0x1: Divide by 4; 0x2: Divide by 8; 0x3: Divide by 16; 0x4: Divide by 32; 0x5: Divide by 64; 0x6: Divide by 128; 0x7: Reserved"
  - name: R33
    offset: 0x21
    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R33; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R34
    offset: 0x22
    width: 16
    access: rw
    reset: 0x10
    description: "LMX2820 SNAU251A register map girdisi R34; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: LOOPBACK_EN
        bits: "11"
        description: "R/W alan; reset 0x0. TI açıklaması: Enables loop back mode. In this mode, both RFIN input path and internal VCO are active, the synthesizer will try to lock to the internal VCO. EXTVCO_EN must be set to 0 in this mode. 0x0: Disabled; 0x1: Enabled"
      - name: EXTVCO_DIV
        bits: "4"
        description: "R/W alan; reset 0x1. TI açıklaması: Sets external VCO input divider value. 0x0: Divide by 2; 0x1: Bypassed"
      - name: EXTVCO_EN
        bits: "0"
        description: "R/W alan; reset 0x0. TI açıklaması: Enables external VCO mode. Set this bit to 1 will enables RFIN input path but disables internal VCO, the synthesizer will try to lock to an external source appear at RFIN pin. In loop back mode, this bit has to be set to 0, RFIN input path will be enabled by the LOOPBACK_EN bit. 0x0: Disabled; 0x1: Enabled"
  - name: R37
    offset: 0x25
    width: 16
    access: rw
    reset: 0x500
    description: "LMX2820 SNAU251A register map girdisi R37; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PFD_DLY
        bits: "14:9"
        description: "R/W alan; reset 0x2. TI açıklaması: Sets N divider delay time in phase detector. Effective only when PFD_DLY_MANUAL = 1. All other values must be set in accordance to the N divider value 0x0: Reserved"
  - name: R38
    offset: 0x26
    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R38; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PLL_DEN_31_16
        bits: "15:0"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets the upper 16 bits of fractional denominator (DEN)."
  - name: R39
    offset: 0x27
    width: 16
    access: rw
    reset: 0x3e8
    description: "LMX2820 SNAU251A register map girdisi R39; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PLL_DEN_15_0
        bits: "15:0"
        description: "R/W alan; reset 0x3E8. TI açıklaması: Sets the lower 16 bits of fractional denominator (DEN)."
  - name: R40
    offset: 0x28
    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R40; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: MASH_SEED_31_16
        bits: "15:0"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets the upper 16 bits of MASH_SEED."
  - name: R41
