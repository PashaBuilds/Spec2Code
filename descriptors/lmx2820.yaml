    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R41; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: MASH_SEED_15_0
        bits: "15:0"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets the lower 16 bits of MASH SEED."
  - name: R42
    offset: 0x2a
    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R42; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PLL_NUM_31_16
        bits: "15:0"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets the upper 16 bits of fractional numerator (NUM)."
  - name: R43
    offset: 0x2b
    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R43; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: PLL_NUM_15_0
        bits: "15:0"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets the lower 16 bits of fractional numerator (NUM)."
  - name: R44
    offset: 0x2c
    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R44; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: INSTCAL_PLL_NUM_31_16
        bits: "15:0"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets the upper 16 bits of INSTCAL_PLL_NUM. INSTCAL_PLL_NUM = 232 x (PLL_NUM / PLL_DEN)."
  - name: R45
    offset: 0x2d
    width: 16
    access: rw
    reset: 0
    description: "LMX2820 SNAU251A register map girdisi R45; TICS Pro export bu 16-bit register image değerini üretir."
    fields:
      - name: INSTCAL_PLL_NUM_15_0
        bits: "15:0"
        description: "R/W alan; reset 0x0. TI açıklaması: Sets the lower 16 bits of INSTCAL_PLL_NUM. INSTCAL_PLL_NUM = 232 x (PLL_NUM / PLL_DEN)."
  - name: R46
    offset: 0x2e
    width: 16
    access: rw
    reset: 0x300
    description: "LMX2820 SNAU251A register map girdisi R46; TICS Pro export bu 16-bit register image değerini üretir."
  - name: R47
    offset: 0x2f
    width: 16
