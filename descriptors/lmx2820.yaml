descriptor_version: "1.0"
part: "LMX2820"
manufacturer: "Texas Instruments"
summary: "22.6 GHz wideband PLLatinum RF synthesizer with phase synchronization and JESD204B support."
transport:
  type: spi
  byte_order: big
  register_model:
    ticspro_words: true
    # Frame format (R/W msb + 7-bit addr + 16-bit data) is not printed in the
    # public SNAS783C datasheet; it matches the documented LMX1204 family
    # format (SNAS800B fig. 5-1) and TI E2E confirmations. fSCK max 40 MHz and
    # descending order + R0 rewrite after 10 ms are from SNAS783C 6.6/8.3.
    frame_bits: 24
    address_bits: 7
    address_shift: 16
    data_bits: 16
    rw_bit: 23
    write_value: 0
    default_order: descending
    spi_mode: 0
    max_sck_hz: 40000000
    rewrite_last_address: 0x00
    rewrite_last_address_after_ms: 10
    # Readback resmi olarak var (SNAS783C 7.3.6 "MUXOUT Pin and Readback";
    # 6.6 SERIAL INTERFACE READ TIMING, tOD = SCK->MUXout). MUXOUT (pin 23)
    # ADANMIS SPI readback cikisidir - bu parcada MUXOUT_LD_SEL alani yok,
    # lock detect ayri LD pininde (pin 38, LD_TYPE R17[6]) oldugundan
    # register konfigurasyonu gerekmez. Okuma frame'i (R/W=1) yazmayla ayni
    # LMX1204-ailesi formati (SNAS800B fig. 5-1; SNAS783C bit diyagrami
    # basmamistir, TI E2E staff teyidi).
    readback:
      verified: true
      requires: "MUXOUT (pin 23) MISO'ya bagli olmali - adanmis SPI readback cikisi, register konfigurasyonu gerekmez (lock detect ayri LD pininde)"
access_primitives:
  write_register_word: { pattern: ticspro_24bit_word }
registers:
  # Reset per SNAU251A section 1.1 (R0 reset = 0x4070).
  - { name: R0, offset: 0x00, width: 16, access: rw, reset: 0x4070,
      fields: [
        { name: POWERDOWN, bits: "0" },
        { name: RESET, bits: "1" },
        { name: FCAL_EN, bits: "4" },
        { name: DBLR_CAL_EN, bits: "6" } ] }
  - { name: R1, offset: 0x01, width: 16, access: rw }
  - { name: R35, offset: 0x23, width: 16, access: rw }
  - { name: R36, offset: 0x24, width: 16, access: rw }
  # Readback durum registerlari (SNAU251A Tables 1-77..1-79).
  - { name: R74, offset: 0x4A, width: 16, access: ro,
      fields: [
        { name: rb_LD, bits: "15:14", description: "VCO kalibrasyon/lock durumu" },
        { name: rb_VCO_CAPCTRL, bits: "12:5" },
        { name: rb_VCO_SEL, bits: "4:2" } ] }
  - { name: R75, offset: 0x4B, width: 16, access: rw }
  - { name: R76, offset: 0x4C, width: 16, access: ro,
      fields: [
        { name: rb_TEMP_SENS, bits: "10:0", description: "dahili sicaklik sensoru okumasi" } ] }
operations:
  - name: device_init
    description: "Apply the ordered TICS Pro 24-bit register array, then re-write R0 after the LDO settle delay."
    steps:
      - { op: comment, note: "config.ticspro_registers is emitted verbatim as MSB-first SPI writes." }
test_hints:
  self_test: { description: "Initialize SPI, emit the configured TICS Pro register array, and repeat R0 after 10 ms." }
