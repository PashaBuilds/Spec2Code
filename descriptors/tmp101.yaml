descriptor_version: "1.0"
part: "TMP101"
manufacturer: "Texas Instruments"
summary: "I2C/SMBus temperature sensor with one address pin and ALERT output."
transport:
  type: i2c
  address_width: 8
  default_address: 0x48      # ADD0=0; float=0x49, ADD0=1 gives 0x4A.
  byte_order: big
access_primitives:
  read_register:  { pattern: write_addr_then_read, width_bytes: 1 }
  write_register: { pattern: write_addr_then_data, width_bytes: 1 }
registers:
  - { name: TEMPERATURE, offset: 0x00, width: 16, access: ro, reset: 0x0000,
      fields: [ { name: TEMP_CODE, bits: "15:4" }, { name: ZERO_PAD, bits: "3:0" } ] }
  # Stored POR value is 0x00, but OS/ALERT (bit 7) reads back 1 after
  # power-up/reset, so the first read returns 0x80 (SBOS231I section 7.5.3).
  - { name: CONFIGURATION, offset: 0x01, width: 8, access: rw, reset: 0x00,
      fields: [
        { name: OS_ALERT, bits: "7" },
        { name: R1, bits: "6" },
        { name: R0, bits: "5" },
        { name: F1, bits: "4" },
        { name: F0, bits: "3" },
        { name: POL, bits: "2" },
        { name: TM, bits: "1" },
        { name: SD, bits: "0" } ] }
  - { name: TLOW, offset: 0x02, width: 16, access: rw, reset: 0x4B00,
      fields: [ { name: TLOW_CODE, bits: "15:4" }, { name: ZERO_PAD, bits: "3:0" } ] }
  - { name: THIGH, offset: 0x03, width: 16, access: rw, reset: 0x5000,
      fields: [ { name: THIGH_CODE, bits: "15:4" }, { name: ZERO_PAD, bits: "3:0" } ] }
operations:
  - name: device_init
    description: "Initialize the I2C controller; TMP101 powers up in continuous conversion mode."
    steps:
      - { op: comment, note: "TMP101 default configuration is continuous conversion, comparator mode, active-low ALERT." }
  - name: temperature_read
    returns: "uint16"
    description: "Read the 12-bit two's-complement temperature register as the raw 16-bit transfer image."
    steps:
      - { op: read_registers, reg: TEMPERATURE, length: 2 }
  - name: config_read
    returns: "uint8"
    description: "Read the configuration register."
    steps:
      - { op: read_register, reg: CONFIGURATION }
test_hints:
  self_test: { description: "Read configuration and raw temperature without changing threshold state." }
