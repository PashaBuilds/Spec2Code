descriptor_version: "1.0"
part: "MT25QU02G"
manufacturer: "Micron"
summary: "2 Gbit (256 MB) SPI NOR flash, 4-byte (32-bit) addressing (stacked die)."
transport:
  type: spi
  address_width: 32          # 4-byte addressing REQUIRED — drives different codegen than MT25Q128
  byte_order: big
access_primitives:
  read_command:  { pattern: opcode_then_read }
  write_command: { pattern: opcode_then_write }
commands:
  - { name: READ_ID,         opcode: 0x9F, address_bytes: 0, description: "RDID" }
  - { name: READ_STATUS,     opcode: 0x05, address_bytes: 0, description: "RDSR" }
  - { name: WRITE_ENABLE,    opcode: 0x06, address_bytes: 0, description: "WREN" }
  - { name: ENTER_4BYTE,     opcode: 0xB7, address_bytes: 0, description: "Enter 4-byte address mode" }
  - { name: EXIT_4BYTE,      opcode: 0xE9, address_bytes: 0, description: "Exit 4-byte address mode" }
  - { name: READ_DATA,       opcode: 0x13, address_bytes: 4, description: "4-byte READ" }
  - { name: FAST_READ,       opcode: 0x0C, address_bytes: 4, description: "4-byte FAST_READ" }
  - { name: PAGE_PROGRAM,    opcode: 0x12, address_bytes: 4, description: "4-byte PP" }
  - { name: SECTOR_ERASE,    opcode: 0xDC, address_bytes: 4, description: "4-byte SE (64KB)" }
  - { name: SUBSECTOR_ERASE, opcode: 0x21, address_bytes: 4, description: "4-byte SSE (4KB)" }
operations:
  - name: device_init
    description: "Enter 4-byte (32-bit) address mode — REQUIRED for this 2Gbit stacked-die part."
    steps:
      - { op: send_command, cmd: WRITE_ENABLE }
      - { op: send_command, cmd: ENTER_4BYTE, note: "0xB7 — switch to 32-bit addressing" }
  - name: id_read
    description: "Read the 3-byte JEDEC device ID (RDID)."
    steps:
      - { op: read_command_address, cmd: READ_ID, length: 3 }
  - name: data_read
    description: "Read length bytes starting at a 32-bit address."
    steps:
      - { op: read_command_address, cmd: READ_DATA }
  - name: page_program
    description: "Program length bytes at a 32-bit address (page <= 256 bytes)."
    steps:
      - { op: send_command, cmd: WRITE_ENABLE }
      - { op: write_command_address, cmd: PAGE_PROGRAM }
  - name: sector_erase
    description: "Erase the 64KB sector containing a 32-bit address."
    steps:
      - { op: send_command, cmd: WRITE_ENABLE }
      - { op: write_command_address, cmd: SECTOR_ERASE, length: 0 }
test_hints:
  self_test: { description: "Enter 4-byte mode, read JEDEC ID, verify Micron manufacturer byte 0x20." }
