descriptor_version: "1.0"
part: "LMK04832"
manufacturer: "Texas Instruments"
summary: "Ultra-low-noise JESD204B clock jitter cleaner with dual-loop PLLs."
transport:
  type: spi
  byte_order: big
  register_model:
    ticspro_words: true
    frame_bits: 24
    address_bits: 15
    address_shift: 8
    data_bits: 8
    rw_bit: 23
    write_value: 0
    default_order: ascending
    spi_mode: 0
    max_sck_hz: 5000000
access_primitives:
  write_register_word: { pattern: ticspro_24bit_word }
registers:
  # POR default is 0x00 (SNAS688C Table 6); 0x10 (SPI_3WIRE_DIS=1) is a value
  # commonly PROGRAMMED for 4-wire readback, not the reset state.
  - { name: RESET, offset: 0x000, width: 8, access: rw, reset: 0x00,
      fields: [
        { name: RESET, bits: "7" },
        { name: SPI_3WIRE_DIS, bits: "4" } ] }
  - { name: PLL2_N_CAL_0, offset: 0x163, width: 8, access: rw }
  - { name: PLL2_N_CAL_1, offset: 0x164, width: 8, access: rw }
  - { name: PLL2_N_CAL_2, offset: 0x165, width: 8, access: rw }
  - { name: PLL2_N_0, offset: 0x166, width: 8, access: rw }
  - { name: PLL2_N_1, offset: 0x167, width: 8, access: rw }
  - { name: PLL2_N_2, offset: 0x168, width: 8, access: rw }
  - { name: PLL2_PD, offset: 0x173, width: 8, access: rw }
  - { name: PLL_LOCK_LOST_CLEAR, offset: 0x182, width: 8, access: rw,
      fields: [
        { name: CLR_PLL1_LD_LOST, bits: "1" },
        { name: CLR_PLL2_LD_LOST, bits: "0" } ] }
  - { name: RB_PLL_STATUS, offset: 0x183, width: 8, access: ro,
      fields: [
        { name: RB_PLL1_DLD_LOST, bits: "3" },
        { name: RB_PLL1_DLD, bits: "2" },
        { name: RB_PLL2_DLD_LOST, bits: "1" },
        { name: RB_PLL2_DLD, bits: "0" } ] }
operations:
  - name: device_init
    description: "Apply the ordered TICS Pro 24-bit register array over SPI."
    steps:
      - { op: comment, note: "config.ticspro_registers is emitted verbatim as MSB-first SPI writes." }
  - name: pll1_lock_detect
    returns: "uint8"
    description: "PLL1 digital lock detect anlık durumunu oku; 1 değeri PLL1 lock detect assert anlamına gelir."
    steps:
      - { op: read_register, reg: RB_PLL_STATUS, mask: 0x04, right_shift: 2 }
  - name: pll1_lock_loss
    returns: "uint8"
    description: "PLL1 digital lock detect düşüşüyle set olan latched lock-loss durumunu oku."
    steps:
      - { op: read_register, reg: RB_PLL_STATUS, mask: 0x08, right_shift: 3 }
  - name: pll2_lock_detect
    returns: "uint8"
    description: "PLL2 digital lock detect anlık durumunu oku; 1 değeri PLL2 lock detect assert anlamına gelir."
    steps:
      - { op: read_register, reg: RB_PLL_STATUS, mask: 0x01, right_shift: 0 }
  - name: pll2_lock_loss
    returns: "uint8"
    description: "PLL2 digital lock detect düşüşüyle set olan latched lock-loss durumunu oku."
    steps:
      - { op: read_register, reg: RB_PLL_STATUS, mask: 0x02, right_shift: 1 }
test_hints:
  self_test: { description: "Initialize SPI and emit the configured TICS Pro register array." }
