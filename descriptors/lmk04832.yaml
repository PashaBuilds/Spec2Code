descriptor_version: "1.0"
part: "LMK04832"
manufacturer: "Texas Instruments"
summary: "Ultra-low-noise JESD204B clock jitter cleaner with dual-loop PLLs."
transport:
  type: spi
  byte_order: big
  register_model:
    ticspro_words: true
    frame_bits: 24
    address_bits: 15
    address_shift: 8
    data_bits: 8
    rw_bit: 23
    write_value: 0
    default_order: ascending
    spi_mode: 0
    max_sck_hz: 5000000
access_primitives:
  write_register_word: { pattern: ticspro_24bit_word }
registers:
  - { name: RESET, offset: 0x000, width: 8, access: rw, reset: 0x10,
      fields: [
        { name: RESET, bits: "7" },
        { name: SPI_3WIRE_DIS, bits: "4" } ] }
  - { name: PLL2_N_CAL_0, offset: 0x163, width: 8, access: rw }
  - { name: PLL2_N_CAL_1, offset: 0x164, width: 8, access: rw }
  - { name: PLL2_N_CAL_2, offset: 0x165, width: 8, access: rw }
  - { name: PLL2_N_0, offset: 0x166, width: 8, access: rw }
  - { name: PLL2_N_1, offset: 0x167, width: 8, access: rw }
  - { name: PLL2_N_2, offset: 0x168, width: 8, access: rw }
  - { name: PLL2_PD, offset: 0x173, width: 8, access: rw }
operations:
  - name: device_init
    description: "Apply the ordered TICS Pro 24-bit register array over SPI."
    steps:
      - { op: comment, note: "config.ticspro_registers is emitted verbatim as MSB-first SPI writes." }
test_hints:
  self_test: { description: "Initialize SPI and emit the configured TICS Pro register array." }
