descriptor_version: "1.0"
part: "LMK04832"
manufacturer: "Texas Instruments"
summary: "Ultra-low-noise JESD204B clock jitter cleaner with dual-loop PLLs."
transport:
  type: spi
  byte_order: big
  register_model:
    ticspro_words: true
    frame_bits: 24
    address_bits: 15
    address_shift: 8
    data_bits: 8
    rw_bit: 23
    write_value: 0
    default_order: ascending
    spi_mode: 0
    max_sck_hz: 5000000
    # Readback SNAS688C ile dogrulandi (8.5 Programming, 8.6.1: "Any
    # register can be read from the same data address"): ayni 24-bit frame,
    # R/W=1 okuma. Adanmis SDO pini YOK - veri 3-wire'da cift yonlu SDIO'da,
    # 4-wire'da "SPI readback" secilen MUX pininde cikar (or. RESET_MUX reg
    # 0x14A[5:3]=6, CLKin_SEL0/1_MUX=6, PLL1/2_LD_MUX=7; 8.6.2.1.1).
    # SPI_3WIRE_DIS (reg 0x000 bit 4, POR 0) yalniz SDIO cikisini kapatir.
    readback:
      verified: true
      requires: "okuma verisi MISO'ya bagli pinde cikmali: 3-wire'da SDIO, 4-wire'da 'SPI readback' secili MUX pini (or. RESET_MUX reg 0x14A[5:3]=6); SPI_3WIRE_DIS yalniz SDIO cikisini kapatir"
access_primitives:
  write_register_word: { pattern: ticspro_24bit_word }
registers:
  # POR default is 0x00 (SNAS688C Table 6). SPI_3WIRE_DIS=1 disables the
  # SDIO output during readback (input-only SDIO); 4-wire readback itself is
  # enabled by programming an output MUX to "SPI readback" (8.6.2.1.1).
  - { name: RESET, offset: 0x000, width: 8, access: rw, reset: 0x00,
      fields: [
        { name: RESET, bits: "7" },
        { name: SPI_3WIRE_DIS, bits: "4" } ] }
  - { name: PLL2_N_CAL_0, offset: 0x163, width: 8, access: rw }
  - { name: PLL2_N_CAL_1, offset: 0x164, width: 8, access: rw }
  - { name: PLL2_N_CAL_2, offset: 0x165, width: 8, access: rw }
  - { name: PLL2_N_0, offset: 0x166, width: 8, access: rw }
  - { name: PLL2_N_1, offset: 0x167, width: 8, access: rw }
  - { name: PLL2_N_2, offset: 0x168, width: 8, access: rw }
  - { name: PLL2_PD, offset: 0x173, width: 8, access: rw }
  - { name: PLL_LOCK_LOST_CLEAR, offset: 0x182, width: 8, access: rw,
      fields: [
        { name: CLR_PLL1_LD_LOST, bits: "1" },
        { name: CLR_PLL2_LD_LOST, bits: "0" } ] }
  - { name: RB_PLL_STATUS, offset: 0x183, width: 8, access: ro,
      fields: [
        { name: RB_PLL1_DLD_LOST, bits: "3" },
        { name: RB_PLL1_DLD, bits: "2" },
        { name: RB_PLL2_DLD_LOST, bits: "1" },
        { name: RB_PLL2_DLD, bits: "0" } ] }
  # --- Katalogdan birlestirilen register haritasi (Registers ekrani
  # katalogla birebir olsun; kaynak: knowledge.ts, datasheet-dogrulanmis). ---
  - name: REG_002
    offset: 2
    width: 8
    access: rw
    description: "LMK04832 Table 5 register map girdisi: POWERDOWN."
    fields:
      - name: POWERDOWN
        bits: "0"
        description: "Cihaz genel power-down kontrolüdür. 0: normal operation; 1: power down device"
  - name: REG_003
    offset: 3
