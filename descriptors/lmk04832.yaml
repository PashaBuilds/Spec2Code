      - name: HOLDOVER_PLL1_DET
        bits: "4"
        description: "PLL1 DLD high'dan low'a düştüğünde holdover/clock switch event üretimini etkinleştirir. 0: PLL1 DLD düşüşü clock switch event üretmez; 1: PLL1 DLD düşüşü clock switch event üretir"
      - name: LOS_EXTERNAL_INPUT
        bits: "3"
        description: "Internal LOS devresi yerine harici pinleri CLKin LOS status kaynağı olarak kullanır; CLKin_SEL0/1 ve Status_LD1 pin type ayarı input olmalıdır. 0: internal LOS kullanılır; 1: external LOS input pinleri kullanılır"
      - name: HOLDOVER_VTUNE_DET
        bits: "2"
        description: "DAC Vtune rail detector'ı etkinleştirir; DAC belirlenen Vtune eşiğine ulaştığında mevcut clock invalid kabul edilip switch event üretilebilir. 0: Vtune detector disabled; 1: Vtune detector enabled"
