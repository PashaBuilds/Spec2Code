descriptor_version: "1.0"
part: "ADAR1000"
manufacturer: "Analog Devices"
summary: "4-channel X/Ku-band beamformer with SPI register and RAM based beam/bias control."
transport:
  type: spi
  byte_order: big
  register_model:
    ticspro_words: true
    frame_bits: 24
    address_bits: 15
    address_shift: 8
    data_bits: 8
    rw_bit: 23
    write_value: 0
    default_order: exported
    spi_mode: 0
    max_sck_hz: 25000000
    # Readback Rev. B datasheet ile dogrulandi: 24-bit ADI SPI frame, R/W=1
    # okuma, 15-bit adres + 8-bit veri. POR 3-wire'dir (INTERFACE_CONFIG_A
    # 0x000 = 0x00): okuma verisi adres basligindan sonra SDIO'da cikar.
    # 4-wire icin SDOACTIVE bit 4 + aynali SDOACTIVE_ bit 3 -> 0x18 yazilir,
    # veri SDO pininde. SDO'nun paylasimli bus'ta bilinen readback hatasi
    # icin Rev. B "SDO Readback Problem and Solution" bolumune bak.
    readback:
      verified: true
      requires: "4-wire icin SDOACTIVE=1 (INTERFACE_CONFIG_A 0x000 <- 0x18) yazilmis ve SDO MISO'ya bagli olmali (3-wire'da veri SDIO'da cikar)"
access_primitives:
  write_register_word: { pattern: spi_24bit_rw_addr_data }
registers:
  - { name: INTERFACE_CONFIG_A, offset: 0x000, width: 8, access: rw, reset: 0x00 }
  - { name: INTERFACE_CONFIG_B, offset: 0x001, width: 8, access: rw, reset: 0x00 }
  # Reset per ADAR1000 Rev. A register summary (Table 23): 0x10.
  - { name: DEV_CONFIG, offset: 0x002, width: 8, access: rw, reset: 0x10 }
  - { name: CHIP_TYPE, offset: 0x003, width: 8, access: ro, reset: 0x00 }
  - { name: PRODUCT_ID_H, offset: 0x004, width: 8, access: ro, reset: 0x00 }
  - { name: PRODUCT_ID_L, offset: 0x005, width: 8, access: ro, reset: 0x00 }
  - { name: SCRATCH_PAD, offset: 0x00A, width: 8, access: rw, reset: 0x00 }
  - { name: SPI_REV, offset: 0x00B, width: 8, access: ro, reset: 0x00 }
  - { name: VENDOR_ID_H, offset: 0x00C, width: 8, access: ro, reset: 0x00 }
  - { name: VENDOR_ID_L, offset: 0x00D, width: 8, access: ro, reset: 0x00 }
  - { name: TRANSFER_REG, offset: 0x00F, width: 8, access: rw, reset: 0x00 }
  - { name: CH1_RX_GAIN, offset: 0x010, width: 8, access: rw, reset: 0x00 }
  - { name: CH2_RX_GAIN, offset: 0x011, width: 8, access: rw, reset: 0x00 }
  - { name: CH3_RX_GAIN, offset: 0x012, width: 8, access: rw, reset: 0x00 }
  - { name: CH4_RX_GAIN, offset: 0x013, width: 8, access: rw, reset: 0x00 }
  - { name: CH1_RX_PHASE_I, offset: 0x014, width: 8, access: rw, reset: 0x00 }
  - { name: CH1_RX_PHASE_Q, offset: 0x015, width: 8, access: rw, reset: 0x00 }
  - { name: CH2_RX_PHASE_I, offset: 0x016, width: 8, access: rw, reset: 0x00 }
  - { name: CH2_RX_PHASE_Q, offset: 0x017, width: 8, access: rw, reset: 0x00 }
  - { name: CH3_RX_PHASE_I, offset: 0x018, width: 8, access: rw, reset: 0x00 }
  - { name: CH3_RX_PHASE_Q, offset: 0x019, width: 8, access: rw, reset: 0x00 }
  - { name: CH4_RX_PHASE_I, offset: 0x01A, width: 8, access: rw, reset: 0x00 }
  - { name: CH4_RX_PHASE_Q, offset: 0x01B, width: 8, access: rw, reset: 0x00 }
  - { name: CH1_TX_GAIN, offset: 0x01C, width: 8, access: rw, reset: 0x00 }
  - { name: CH2_TX_GAIN, offset: 0x01D, width: 8, access: rw, reset: 0x00 }
  - { name: CH3_TX_GAIN, offset: 0x01E, width: 8, access: rw, reset: 0x00 }
  - { name: CH4_TX_GAIN, offset: 0x01F, width: 8, access: rw, reset: 0x00 }
  - { name: CH1_TX_PHASE_I, offset: 0x020, width: 8, access: rw, reset: 0x00 }
  - { name: CH1_TX_PHASE_Q, offset: 0x021, width: 8, access: rw, reset: 0x00 }
  - { name: CH2_TX_PHASE_I, offset: 0x022, width: 8, access: rw, reset: 0x00 }
  - { name: CH2_TX_PHASE_Q, offset: 0x023, width: 8, access: rw, reset: 0x00 }
  - { name: CH3_TX_PHASE_I, offset: 0x024, width: 8, access: rw, reset: 0x00 }
  - { name: CH3_TX_PHASE_Q, offset: 0x025, width: 8, access: rw, reset: 0x00 }
  - { name: CH4_TX_PHASE_I, offset: 0x026, width: 8, access: rw, reset: 0x00 }
