  - { name: BIAS_CURRENT_RX_LNA, offset: 0x034, width: 8, access: rw, reset: 0x00 }
  - { name: BIAS_CURRENT_RX, offset: 0x035, width: 8, access: rw, reset: 0x00 }
  - { name: BIAS_CURRENT_TX, offset: 0x036, width: 8, access: rw, reset: 0x00 }
  - { name: BIAS_CURRENT_TX_DRV, offset: 0x037, width: 8, access: rw, reset: 0x00 }
  - { name: MEM_CTRL, offset: 0x038, width: 8, access: rw, reset: 0x00 }
  - { name: RX_CHX_MEM, offset: 0x039, width: 8, access: rw, reset: 0x00 }
  - { name: TX_CHX_MEM, offset: 0x03A, width: 8, access: rw, reset: 0x00 }
  - { name: RX_CH1_MEM, offset: 0x03D, width: 8, access: rw, reset: 0x00 }
  - { name: RX_CH2_MEM, offset: 0x03E, width: 8, access: rw, reset: 0x00 }
  - { name: RX_CH3_MEM, offset: 0x03F, width: 8, access: rw, reset: 0x00 }
  - { name: RX_CH4_MEM, offset: 0x040, width: 8, access: rw, reset: 0x00 }
  - { name: TX_CH1_MEM, offset: 0x041, width: 8, access: rw, reset: 0x00 }
  - { name: TX_CH2_MEM, offset: 0x042, width: 8, access: rw, reset: 0x00 }
  - { name: TX_CH3_MEM, offset: 0x043, width: 8, access: rw, reset: 0x00 }
  - { name: TX_CH4_MEM, offset: 0x044, width: 8, access: rw, reset: 0x00 }
  - { name: REV_ID, offset: 0x045, width: 8, access: ro, reset: 0x00 }
  - { name: CH1_PA_BIAS_OFF, offset: 0x046, width: 8, access: rw, reset: 0x00 }
  - { name: CH2_PA_BIAS_OFF, offset: 0x047, width: 8, access: rw, reset: 0x00 }
  - { name: CH3_PA_BIAS_OFF, offset: 0x048, width: 8, access: rw, reset: 0x00 }
  - { name: CH4_PA_BIAS_OFF, offset: 0x049, width: 8, access: rw, reset: 0x00 }
  - { name: LNA_BIAS_OFF, offset: 0x04A, width: 8, access: rw, reset: 0x00 }
  - { name: TX_TO_RX_DELAY_CTRL, offset: 0x04B, width: 8, access: rw, reset: 0x00 }
  - { name: RX_TO_TX_DELAY_CTRL, offset: 0x04C, width: 8, access: rw, reset: 0x00 }
  - { name: TX_BEAM_STEP_START, offset: 0x04D, width: 8, access: rw, reset: 0x00 }
  - { name: TX_BEAM_STEP_STOP, offset: 0x04E, width: 8, access: rw, reset: 0x00 }
  - { name: RX_BEAM_STEP_START, offset: 0x04F, width: 8, access: rw, reset: 0x00 }
  - { name: RX_BEAM_STEP_STOP, offset: 0x050, width: 8, access: rw, reset: 0x00 }
  - { name: RX_BIAS_RAM_CTL, offset: 0x051, width: 8, access: rw, reset: 0x00 }
  - { name: TX_BIAS_RAM_CTL, offset: 0x052, width: 8, access: rw, reset: 0x00 }
  - { name: LDO_TRIM_CTL_0, offset: 0x400, width: 8, access: rw, reset: 0x00 }
  - { name: LDO_TRIM_CTL_1, offset: 0x401, width: 8, access: rw, reset: 0x00 }
operations:
  - name: device_init
    description: "Apply the configured ordered ADAR1000 24-bit SPI register-word array."
    steps:
      - { op: comment, note: "config.register_words is emitted verbatim as MSB-first SPI writes." }
test_hints:
  post_init_status: { reg: CHIP_TYPE }
  self_test: { description: "Initialize SPI and emit the configured ADAR1000 register-word array." }
