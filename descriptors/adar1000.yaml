  - { name: LD_WRK_REGS, offset: 0x028, width: 8, access: wo, reset: 0x00 }
  - { name: CH1_PA_BIAS_ON, offset: 0x029, width: 8, access: rw, reset: 0x00 }
  - { name: CH2_PA_BIAS_ON, offset: 0x02A, width: 8, access: rw, reset: 0x00 }
  - { name: CH3_PA_BIAS_ON, offset: 0x02B, width: 8, access: rw, reset: 0x00 }
  - { name: CH4_PA_BIAS_ON, offset: 0x02C, width: 8, access: rw, reset: 0x00 }
  - { name: LNA_BIAS_ON, offset: 0x02D, width: 8, access: rw, reset: 0x00 }
  - { name: RX_ENABLES, offset: 0x02E, width: 8, access: rw, reset: 0x00 }
  - { name: TX_ENABLES, offset: 0x02F, width: 8, access: rw, reset: 0x00 }
  - { name: MISC_ENABLES, offset: 0x030, width: 8, access: rw, reset: 0x00 }
