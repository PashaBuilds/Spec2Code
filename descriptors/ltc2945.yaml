descriptor_version: "1.0"
part: "LTC2945"
manufacturer: "Analog Devices"
summary: "Wide range I2C power monitor measuring current, voltage, power, and ADIN."
transport:
  type: i2c
  address_width: 8
  default_address: 0x67      # 7-bit form of the CEh write address option.
  byte_order: big
access_primitives:
  read_register:  { pattern: write_addr_then_read, width_bytes: 1 }
  write_register: { pattern: write_addr_then_data, width_bytes: 1 }
registers:
  - { name: CONTROL,       offset: 0x00, width: 8, access: rw, reset: 0x05,
      fields: [
        { name: SNAPSHOT_ENABLE, bits: "7" },
        { name: SNAPSHOT_CHANNEL, bits: "6:5" },
        { name: TEST_MODE, bits: "4" },
        { name: ADC_BUSY, bits: "3" },
        { name: VIN_MONITOR, bits: "2" },
        { name: SHUTDOWN, bits: "1" },
        { name: MULTIPLIER_SELECT, bits: "0" } ] }
  - { name: ALERT_ENABLE,  offset: 0x01, width: 8, access: rw, reset: 0x00 }
  - { name: STATUS,        offset: 0x02, width: 8, access: ro, reset: 0x00 }
  - { name: FAULT,         offset: 0x03, width: 8, access: rw, reset: 0x00 }
  - { name: FAULT_CLEAR,   offset: 0x04, width: 8, access: cor, reset: 0x00 }
  - { name: POWER_MSB2,    offset: 0x05, width: 8, access: rw* }
  - { name: POWER_MSB1,    offset: 0x06, width: 8, access: rw* }
  - { name: POWER_LSB,     offset: 0x07, width: 8, access: rw* }
  - { name: MAX_POWER_MSB2, offset: 0x08, width: 8, access: rw*, reset: 0x00 }
  - { name: MAX_POWER_MSB1, offset: 0x09, width: 8, access: rw*, reset: 0x00 }
  - { name: MAX_POWER_LSB,  offset: 0x0A, width: 8, access: rw*, reset: 0x00 }
  - { name: MIN_POWER_MSB2, offset: 0x0B, width: 8, access: rw*, reset: 0xFF }
  - { name: MIN_POWER_MSB1, offset: 0x0C, width: 8, access: rw*, reset: 0xFF }
  - { name: MIN_POWER_LSB,  offset: 0x0D, width: 8, access: rw*, reset: 0xFF }
  - { name: MAX_POWER_THRESHOLD_MSB2, offset: 0x0E, width: 8, access: rw, reset: 0xFF }
  - { name: MAX_POWER_THRESHOLD_MSB1, offset: 0x0F, width: 8, access: rw, reset: 0xFF }
  - { name: MAX_POWER_THRESHOLD_LSB,  offset: 0x10, width: 8, access: rw, reset: 0xFF }
  - { name: MIN_POWER_THRESHOLD_MSB2, offset: 0x11, width: 8, access: rw, reset: 0x00 }
  - { name: MIN_POWER_THRESHOLD_MSB1, offset: 0x12, width: 8, access: rw, reset: 0x00 }
  - { name: MIN_POWER_THRESHOLD_LSB,  offset: 0x13, width: 8, access: rw, reset: 0x00 }
  - { name: SENSE_MSB,     offset: 0x14, width: 8, access: rw* }
  - { name: SENSE_LSB,     offset: 0x15, width: 8, access: rw* }
  - { name: MAX_SENSE_MSB, offset: 0x16, width: 8, access: rw*, reset: 0x00 }
  - { name: MAX_SENSE_LSB, offset: 0x17, width: 8, access: rw*, reset: 0x00 }
  - { name: MIN_SENSE_MSB, offset: 0x18, width: 8, access: rw*, reset: 0xFF }
  - { name: MIN_SENSE_LSB, offset: 0x19, width: 8, access: rw*, reset: 0xF0 }
  - { name: MAX_SENSE_THRESHOLD_MSB, offset: 0x1A, width: 8, access: rw, reset: 0xFF }
  - { name: MAX_SENSE_THRESHOLD_LSB, offset: 0x1B, width: 8, access: rw, reset: 0xF0 }
  - { name: MIN_SENSE_THRESHOLD_MSB, offset: 0x1C, width: 8, access: rw, reset: 0x00 }
  - { name: MIN_SENSE_THRESHOLD_LSB, offset: 0x1D, width: 8, access: rw, reset: 0x00 }
  - { name: VIN_MSB,       offset: 0x1E, width: 8, access: rw* }
  - { name: VIN_LSB,       offset: 0x1F, width: 8, access: rw* }
  - { name: MAX_VIN_MSB,   offset: 0x20, width: 8, access: rw*, reset: 0x00 }
  - { name: MAX_VIN_LSB,   offset: 0x21, width: 8, access: rw*, reset: 0x00 }
  - { name: MIN_VIN_MSB,   offset: 0x22, width: 8, access: rw*, reset: 0xFF }
  - { name: MIN_VIN_LSB,   offset: 0x23, width: 8, access: rw*, reset: 0xF0 }
  - { name: MAX_VIN_THRESHOLD_MSB, offset: 0x24, width: 8, access: rw, reset: 0xFF }
  - { name: MAX_VIN_THRESHOLD_LSB, offset: 0x25, width: 8, access: rw, reset: 0xF0 }
  - { name: MIN_VIN_THRESHOLD_MSB, offset: 0x26, width: 8, access: rw, reset: 0x00 }
  - { name: MIN_VIN_THRESHOLD_LSB, offset: 0x27, width: 8, access: rw, reset: 0x00 }
  - { name: ADIN_MSB,      offset: 0x28, width: 8, access: rw* }
  - { name: ADIN_LSB,      offset: 0x29, width: 8, access: rw* }
  - { name: MAX_ADIN_MSB,  offset: 0x2A, width: 8, access: rw*, reset: 0x00 }
  - { name: MAX_ADIN_LSB,  offset: 0x2B, width: 8, access: rw*, reset: 0x00 }
  - { name: MIN_ADIN_MSB,  offset: 0x2C, width: 8, access: rw*, reset: 0xFF }
  - { name: MIN_ADIN_LSB,  offset: 0x2D, width: 8, access: rw*, reset: 0xF0 }
  - { name: MAX_ADIN_THRESHOLD_MSB, offset: 0x2E, width: 8, access: rw, reset: 0xFF }
  - { name: MAX_ADIN_THRESHOLD_LSB, offset: 0x2F, width: 8, access: rw, reset: 0xF0 }
  - { name: MIN_ADIN_THRESHOLD_MSB, offset: 0x30, width: 8, access: rw, reset: 0x00 }
  - { name: MIN_ADIN_THRESHOLD_LSB, offset: 0x31, width: 8, access: rw, reset: 0x00 }
operations:
  - name: device_init
    description: "Initialize I2C and select continuous scan of SENSE+/VDD for power calculation."
    steps:
      - { op: write_register, reg: CONTROL, value: 0x05 }
  - name: status_read
    returns: "uint8"
    description: "Read the status register."
    steps:
      - { op: read_register, reg: STATUS }
  # 12-bit results are left-aligned in D15..D4. LSB weights per datasheet:
  # delta-sense 25 uV, VIN 25 mV, ADIN 0.5 mV.
  - name: power_read
    returns: "uint32"
    description: "Read the raw 24-bit power product (VIN x delta-sense). Kept raw on purpose: P = code * 25 uV * 25 mV / Rsense needs the board's sense resistor, which is application data."
    steps:
      - { op: read_registers, reg: POWER_MSB2, length: 3 }
  - name: sense_read
    returns: "int32"
    description: "Read the delta-sense (shunt) voltage converted to microvolts (12-bit in D15..D4, LSB 25 uV). I = Vsense / Rsense is applied by the application."
    convert: { rshift: 4, mask: 0xFFF, signed_bits: 0, scale_num: 25, scale_den: 1, unit: "uV" }
    steps:
      - { op: read_registers, reg: SENSE_MSB, length: 2 }
  # Akim = Vsense / Rsense. Sont direnci KART verisidir: device.config.
  # sense_resistor_mohms (miliohm, pozitif tamsayi) zorunlu. Verilmezse bu
  # op uretimden dusurulur (acikca istenirse anlasilir hata). Birim analizi:
  # I_mA = (kod x 25 uV) / R_mohm  -> uV / mohm = mA.
  - name: current_read
    returns: "int32"
    description: "Read the sense current converted to milliamps using the board's shunt (device.config.sense_resistor_mohms; I_mA = code * 25 uV / R_mohm)."
    convert: { rshift: 4, mask: 0xFFF, signed_bits: 0, scale_num: 25, scale_den_config: sense_resistor_mohms, unit: "mA" }
    steps:
      - { op: read_registers, reg: SENSE_MSB, length: 2 }
  - name: voltage_read
    returns: "int32"
    description: "Read VIN converted to millivolts (12-bit in D15..D4, LSB 25 mV)."
    convert: { rshift: 4, mask: 0xFFF, signed_bits: 0, scale_num: 25, scale_den: 1, unit: "mV" }
    steps:
      - { op: read_registers, reg: VIN_MSB, length: 2 }
  - name: adin_read
    returns: "int32"
    description: "Read ADIN converted to microvolts (12-bit in D15..D4, LSB 0.5 mV)."
    convert: { rshift: 4, mask: 0xFFF, signed_bits: 0, scale_num: 500, scale_den: 1, unit: "uV" }
    steps:
      - { op: read_registers, reg: ADIN_MSB, length: 2 }
test_hints:
  self_test: { description: "Read status, power, sense, VIN, and ADIN raw codes." }
  post_init_status: { reg: CONTROL }
