name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

jobs:
  source:
    name: Source archives
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build source archives
        run: python scripts/package_release.py --version "$RELEASE_VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: spec2code-source
          path: release-assets/*

  macos:
    name: macOS executable
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SPEC2CODE_VERSION: ${{ env.RELEASE_VERSION }}
        run: npm ci && npm run build
      - name: Build executable bundle
        run: python scripts/build_executable.py --version "$RELEASE_VERSION"
      - uses: actions/upload-artifact@v4
        with:
          name: spec2code-macos
          path: release-assets/*.zip

  windows:
    name: Windows executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SPEC2CODE_VERSION: ${{ env.RELEASE_VERSION }}
        run: npm ci && npm run build
      - name: Build executable bundle
        run: python scripts/build_executable.py --version "${env:RELEASE_VERSION}"
      - uses: actions/upload-artifact@v4
        with:
          name: spec2code-windows
          path: release-assets/*.zip

  publish:
    name: Publish GitHub Release
    needs: [source, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: List release assets
        run: find release-assets -maxdepth 1 -type f -print | sort
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: release-assets/*
          generate_release_notes: true
