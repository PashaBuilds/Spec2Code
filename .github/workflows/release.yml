name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  GH_TOKEN: ${{ github.token }}

# NOT (2026-07-10): actions/upload-artifact tamamen kaldirildi. Repo private
# olunca artefakt depolamasi hesap kotasina sayilmaya basladi ve kota dolunca
# CreateArtifact reddedilip release kirildi (v0.1.140 ilk denemesi). Artefaktlar
# zaten yalniz job'lar arasi tasima icindi; simdi her job kendi dosyasini
# dogrudan GitHub Release'e yukluyor (draft olustur -> paralel upload ->
# publish). Kalici kopyalar Release'te; Actions depolama kotasi artik
# release akisini etkileyemez.

jobs:
  create:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release if missing
        run: |
          if gh release view "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "release $RELEASE_VERSION zaten var"
          else
            gh release create "$RELEASE_VERSION" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_VERSION" \
              --draft \
              --generate-notes
          fi

  source:
    name: Source archives
    needs: create
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build source archives
        run: python scripts/package_release.py --version "$RELEASE_VERSION"
      - name: Upload assets to release
        run: gh release upload "$RELEASE_VERSION" release-assets/* --repo "$GITHUB_REPOSITORY" --clobber

  macos:
    name: macOS executable
    needs: create
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SPEC2CODE_VERSION: ${{ env.RELEASE_VERSION }}
        run: npm ci && npm run build
      - name: Build executable bundle
        run: python scripts/build_executable.py --version "$RELEASE_VERSION"
      - name: Upload assets to release
        run: gh release upload "$RELEASE_VERSION" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --clobber

  windows:
    name: Windows executable
    needs: create
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_SPEC2CODE_VERSION: ${{ env.RELEASE_VERSION }}
        run: npm ci && npm run build
      - name: Build executable bundle
        run: python scripts/build_executable.py --version "${env:RELEASE_VERSION}"
      - name: Upload assets to release
        shell: bash
        run: gh release upload "$RELEASE_VERSION" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --clobber

  publish:
    name: Publish GitHub Release
    needs: [source, macos, windows]
    runs-on: ubuntu-latest
    steps:
      - name: List release assets
        run: gh release view "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | sort
      - name: Undraft release
        run: gh release edit "$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" --draft=false
